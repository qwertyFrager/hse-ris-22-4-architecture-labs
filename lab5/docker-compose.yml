services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: dss
      POSTGRES_USER: dss
      POSTGRES_PASSWORD: dss
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dss -d dss"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    environment:
      API_KEY: demo
      DATABASE_URL: postgresql+psycopg2://dss:dss@db:5432/dss
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend