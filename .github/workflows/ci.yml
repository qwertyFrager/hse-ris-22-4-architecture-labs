name: CI (Docker build + integration tests)

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images
        run: |
          docker build -t lab5-backend:ci ./lab5/backend
          docker build -t lab5-frontend:ci ./lab5/frontend

      - name: Start services (docker compose)
        working-directory: lab5
        run: |
          docker compose up -d --build
          docker ps

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl -s -H "X-API-Key: demo" http://localhost:8000/api/v1/health | grep -q "ok"; then
              echo "Backend is up";
              exit 0;
            fi
            echo "Waiting backend...";
            sleep 2;
          done
          echo "Backend not ready"; exit 1

      - name: Run integration tests (Newman)
        run: |
          npm install -g newman
          newman run lab5/tests/postman/collection.json

      - name: Show logs on failure
        if: failure()
        working-directory: lab5
        run: |
          docker compose logs --no-color

      - name: Shutdown
        if: always()
        working-directory: lab5
        run: docker compose down -v